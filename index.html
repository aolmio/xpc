<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burmese Text + Watermark Editor</title>

<style>

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#1a1a1a;
color:#eee;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

.editor{
display:flex;
gap:30px;
align-items:flex-start;
max-width:1400px;
width:100%;
}

canvas{
border:3px solid #444;
border-radius:10px;
background:#000;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.controls{
width:360px;
background:#2d2d2d;
padding:20px;
border-radius:12px;
}

.control-group{
margin-bottom:14px;
border-bottom:1px solid #444;
padding-bottom:10px;
}

label{
font-size:11px;
text-transform:uppercase;
letter-spacing:1px;
color:#aaa;
display:block;
margin-bottom:6px;
}

input,textarea,select{
width:100%;
box-sizing:border-box;
}

textarea{
background:#111;
color:white;
border:1px solid #555;
padding:8px;
border-radius:4px;
height:80px;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
width:100%;
padding:12px;
background:#d4af37;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#f6e5a0;
}

</style>
</head>

<body>

<h2 style="color:#d4af37">Burmese Photo Editor</h2>

<div class="editor">

<canvas id="textCanvas" width="1000" height="600"></canvas>

<div class="controls">

<div class="control-group">
<label>Upload Photo</label>
<input type="file" id="imageLoader" accept="image/*">
</div>

<div class="control-group">
<label>Upload Watermark PNG</label>
<input type="file" id="watermarkLoader" accept="image/png">
</div>

<div class="control-group">
<label>Watermark Position</label>

<div class="grid2">
<input type="range" id="wmX" min="0" max="1000" value="800">
<input type="range" id="wmY" min="0" max="600" value="400">
</div>

</div>

<div class="control-group">
<label>Watermark Size</label>
<input type="range" id="wmSize" min="5" max="50" value="20">
</div>

<div class="control-group">
<label>Watermark Opacity</label>
<input type="range" id="wmOpacity" min="0.05" max="1" step="0.05" value="0.8">
</div>

<div class="control-group">
<label>Watermark Mode</label>
<select id="wmRepeat">
<option value="single">Single</option>
<option value="pattern">Repeat Pattern</option>
</select>
</div>

<div class="control-group">
<label>Text</label>
<textarea id="textInput">မြန်မာစာ အလှရေးသားခြင်း
အပိုဒ်ခွဲ စမ်းသပ်ချက်
အချက်အလက် (၁)</textarea>
</div>

<div class="control-group">
<label>Text Position</label>
<div class="grid2">
<input type="range" id="xPos" min="0" max="1000" value="100">
<input type="range" id="yPos" min="0" max="600" value="100">
</div>
</div>

<div class="control-group">
<label>Font Size</label>
<input type="range" id="fontSize" min="10" max="150" value="50">
</div>

<div class="control-group">
<label>Line Spacing</label>
<input type="range" id="lineSpacing" min="1" max="3" step="0.1" value="1.4">
</div>

<div class="control-group">
<label>Gradient Colors</label>

<div class="grid2">
<input type="color" id="color1" value="#f6e5a0">
<input type="color" id="color2" value="#b38e46">
</div>

</div>

<div class="control-group">
<label>Text Alignment</label>
<select id="textAlign">
<option value="left">Left</option>
<option value="center" selected>Center</option>
<option value="right">Right</option>
</select>
</div>

<button id="downloadBtn">Export Image</button>

</div>

</div>

<script>

const canvas=document.getElementById("textCanvas")
const ctx=canvas.getContext("2d")

const ids=[
"imageLoader","watermarkLoader","textInput","fontSize","xPos","yPos",
"color1","color2","lineSpacing","textAlign",
"wmX","wmY","wmSize","wmOpacity","wmRepeat"
]

const el={}
ids.forEach(id=>el[id]=document.getElementById(id))

let img=new Image()
let watermark=new Image()
let watermarkLoaded=false

el.imageLoader.addEventListener("change",e=>{

const reader=new FileReader()

reader.onload=event=>{
img.onload=()=>{
canvas.height=(img.height/img.width)*canvas.width
el.yPos.max=canvas.height
el.xPos.max=canvas.width
el.wmX.max=canvas.width
el.wmY.max=canvas.height
draw()
}

img.src=event.target.result
}

reader.readAsDataURL(e.target.files[0])

})

el.watermarkLoader.addEventListener("change",e=>{

const reader=new FileReader()

reader.onload=event=>{
watermark.onload=()=>{
watermarkLoaded=true
draw()
}

watermark.src=event.target.result
}

reader.readAsDataURL(e.target.files[0])

})

Object.values(el).forEach(i=>{
if(i.type!=="file") i.addEventListener("input",draw)
})

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(img.src){
ctx.drawImage(img,0,0,canvas.width,canvas.height)
}else{
ctx.fillStyle="#222"
ctx.fillRect(0,0,canvas.width,canvas.height)
}

drawWatermark()
drawText()

}

function drawWatermark(){

if(!watermarkLoaded) return

const size=parseInt(el.wmSize.value)/100

const wmWidth=canvas.width*size
const wmHeight=watermark.height*(wmWidth/watermark.width)

ctx.globalAlpha=parseFloat(el.wmOpacity.value)

if(el.wmRepeat.value==="pattern"){

const space=250

for(let x=-canvas.width;x<canvas.width*2;x+=space){
for(let y=-canvas.height;y<canvas.height*2;y+=space){

ctx.save()
ctx.translate(x,y)
ctx.rotate(-0.5)
ctx.drawImage(watermark,-wmWidth/2,-wmHeight/2,wmWidth,wmHeight)
ctx.restore()

}
}

}else{

ctx.drawImage(
watermark,
parseInt(el.wmX.value),
parseInt(el.wmY.value),
wmWidth,
wmHeight
)

}

ctx.globalAlpha=1

}

function drawText(){

const lines=el.textInput.value.split("\n")
const fSize=parseInt(el.fontSize.value)
const lineH=fSize*parseFloat(el.lineSpacing.value)

ctx.font=`bold ${fSize}px Pyidaungsu,Myanmar3,sans-serif`
ctx.textAlign=el.textAlign.value
ctx.textBaseline="top"

lines.forEach((line,index)=>{

const y=parseInt(el.yPos.value)+(index*lineH)

const grad=ctx.createLinearGradient(0,y,0,y+fSize)

grad.addColorStop(0,el.color1.value)
grad.addColorStop(1,el.color2.value)

ctx.shadowColor="rgba(0,0,0,0.7)"
ctx.shadowOffsetX=3
ctx.shadowOffsetY=3
ctx.shadowBlur=6

ctx.fillStyle=grad

ctx.fillText(line,parseInt(el.xPos.value),y)

})

}

document.getElementById("downloadBtn").onclick=()=>{

const link=document.createElement("a")

link.download="burmese-design.png"
link.href=canvas.toDataURL("image/png")

link.click()

}

</script>

</body>
</html>
```
